  <script>
    // ============================================================

    const firebaseConfig = {
  apiKey: "AIzaSyBKC77CWItSKcVALZqZNaNWx5ZO8_8sqaU",
  authDomain: "letsgoarchaeo.firebaseapp.com",
  databaseURL: "https://letsgoarchaeo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "letsgoarchaeo",
  storageBucket: "letsgoarchaeo.firebasestorage.app",
  messagingSenderId: "653875442319",
  appId: "1:653875442319:web:6ea4211835fe02cf1fb6fa"
    };
    // ============================================================

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Globale Hilfsfunktionen für Firebase
    window.fbLoad = function(key, fallback) {
      return new Promise((resolve) => {
        db.ref(key).once('value')
          .then(snap => {
            const val = snap.val();
            resolve(val !== null ? val : fallback);
          })
          .catch(() => resolve(fallback));
      });
    };

    window.fbSave = function(key, value) {
      return db.ref(key).set(value).catch(e => console.error('Firebase Speicherfehler:', e));
    };

    window.fbListen = function(key, callback) {
      db.ref(key).on('value', snap => {
        const val = snap.val();
        if (val !== null) callback(val);
      });
      return () => db.ref(key).off('value');
    };

      useEffect(() => {
        if (isDarkMode) {
          document.body.classList.add('dark-mode');
        } else {
          document.body.classList.remove('dark-mode');
        }
      }, [isDarkMode]);

      useEffect(() => {
        if (screen !== 'documents') {
          setShowAddFinding(false);
          setShowFindingDetail(false);
          setCurrentFinding(null);
        }
      }, [screen]);

      // LOGIN Handler
      const handleLogin = (e) => {
        e.preventDefault();
        setLoginError('');
        
        const user = users.find(u => u.username === loginData.username && u.password === loginData.password);
        
        if (user) {
          setCurrentUser(user);
          setIsLoggedIn(true);
          setLoginData({ username: '', password: '' });
        } else {
          setLoginError(t('loginErrorWrong'));
        }
      };

      // REGISTRIERUNGS Handler
      const handleRegister = (e) => {
        e.preventDefault();
        setRegisterError('');

        if (!registerData.vorname || !registerData.name || !registerData.username || 
            !registerData.password || !registerData.passwordConfirm || !registerData.roleCode) {
          setRegisterError(t('fillAllFields'));
          return;
        }

        if (users.find(u => u.username === registerData.username)) {
          setRegisterError(t('usernameExists'));
          return;
        }

        if (registerData.password !== registerData.passwordConfirm) {
          setRegisterError(t('passwordsMismatch'));
          return;
        }

        if (registerData.password.length < 6) {
          setRegisterError(t('passwordTooShort'));
          return;
        }

        const role = ROLE_CODES[registerData.roleCode];
        if (!role) {
          setRegisterError(t('invalidRoleCode'));
          return;
        }

        const newUser = {
          username: registerData.username,
          password: registerData.password,
          role: role,
          vorname: registerData.vorname,
          name: registerData.name
        };

        const newUsers = [...users, newUser];
        setUsers(newUsers);
        saveGlobal('archaeo-users', newUsers);
        
        alert(`${t('accountCreated')}\n\n${t('nameLabel')}: ${newUser.vorname} ${newUser.name}\n${t('roleLabel')}: ${getRoleName(role)}\n\n${t('canLoginNow')}`);
        
        setShowRegister(false);
        setRegisterData({
          vorname: '',
          name: '',
          username: '',
          password: '',
          passwordConfirm: '',
          roleCode: ''
        });
      };

      const logout = () => {
        setIsLoggedIn(false);
        setCurrentUser(null);
        setScreen('home');
      };

      const addFinding = () => {
        const now = new Date();
        const fundzeit = `${now.toLocaleDateString(locale)} ${now.toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' })}`;
        
        setCurrentFinding({
          name: '',
          material: '',
          fundart: '',
          fundstelle: '',
          fundzeit: fundzeit,
          finder: `${currentUser.vorname} ${currentUser.name}`,
          datum: new Date().toLocaleDateString(locale),
          
          epoche: '',
          datierung: '',
          kultur: '',
          
          beschreibung: '',
          erhaltung: '',
          
          fundstelle_gps: '',
          fundumstaende: '',
          fundtiefe: '',
          schicht: '',
          
          masse: '',
          laenge: '',
          breite: '',
          hoehe: '',
          durchmesser: '',
          gewicht: '',
          
          fundnummer: '',
          fundkiste: '',
          inventarnummer: '',
          
          bestimmung: '',
          vergleichsfunde: '',
          literatur: '',
          
          verbleib: '',
          eigentum: '',
          
          bemerkungen: '',
          foto: null
        });
        setShowAddFinding(true);
      };

      const saveFinding = () => {
        if (!currentFinding.name || !currentFinding.material || !currentFinding.fundart || !currentFinding.fundstelle || !currentFinding.fundzeit) {
          alert(t('alertFillRequired'));
          return;
        }
        
        setTempFinding(currentFinding);
        setShowFundDsgvo(true);
      };

      const confirmSaveFinding = () => {
        if (!fundDsgvoAccepted) return;
        
        let newFindings;
        if (tempFinding.id) {
          newFindings = findings.map(f => f.id === tempFinding.id ? tempFinding : f);
        } else {
          newFindings = [...findings, { ...tempFinding, id: Date.now() }];
        }
        
        setFindings(newFindings);
        saveGlobal('archaeo-findings', newFindings);
        
        setShowAddFinding(false);
        setCurrentFinding(null);
        setShowFundDsgvo(false);
        setFundDsgvoAccepted(false);
        setTempFinding(null);
      };

      const editFinding = (finding) => {
        setCurrentFinding({...finding});
        setShowAddFinding(true);
      };

      const viewFinding = (finding) => {
        setCurrentFinding(finding);
        setShowFindingDetail(true);
      };

      const requestDelete = (finding) => {
        setFindingToDelete(finding);
        setShowDeleteConfirm(true);
      };

      const deleteFinding = (finding) => {
        const newFindings = findings.filter(f => f.id !== finding.id);
        setFindings(newFindings);
        saveGlobal('archaeo-findings', newFindings);
        setShowDeleteConfirm(false);
        setFindingToDelete(null);
      };

      const cancelDelete = () => {
        setShowDeleteConfirm(false);
        setFindingToDelete(null);
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setCurrentFinding({...currentFinding, foto: reader.result});
          };
          reader.readAsDataURL(file);
        }
      };

      const sendMessage = () => {
        if (!currentMessage.text) {
          alert(t('alertEnterMessage'));
          return;
        }
        
        const newMsg = {
          id: Date.now(),
          from: currentUser.username,
          to: currentMessage.to,
          betreff: currentMessage.betreff,
          text: currentMessage.text,
          datum: new Date().toLocaleString(locale)
        };
        
        const newMessages = [...messages, newMsg];
        setMessages(newMessages);
        saveGlobal('archaeo-messages', newMessages);
        setCurrentMessage({ to: 'Alle', betreff: '', text: '' });
        setShowMessageModal(false);
        alert(t('alertMessageSent'));
      };

      const getMyMessages = () => {
        return messages.filter(m => 
          m.to === currentUser.username || 
          m.to === 'Alle' || 
          m.from === currentUser.username
        );
      };

      const getCurrentLocation = () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => {
              const gps = `${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}`;
              setCurrentFinding({...currentFinding, fundstelle_gps: gps});
              alert(t('alertGPSSuccess'));
            },
            (error) => {
              alert(t('alertGPSError') + error.message);
            }
          );
        } else {
          alert(t('alertGPSNotSupported'));
        }
      };

      const filteredFindings = findings.filter(f => 
        !searchTerm || 
        f.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
        f.material.toLowerCase().includes(searchTerm.toLowerCase()) ||
        f.fundart.toLowerCase().includes(searchTerm.toLowerCase())
      );

      useEffect(() => {
        if (showMap && findings.filter(f => f.fundstelle_gps).length > 0) {
          setTimeout(() => {
            const mapContainer = document.getElementById('fullscreen-map');
            if (!mapContainer) return;
            
            mapContainer.innerHTML = '';
            
            const fundWithGPS = findings.filter(f => f.fundstelle_gps);
            if (fundWithGPS.length === 0) return;
            
            const firstCoords = fundWithGPS[0].fundstelle_gps.split(',').map(c => parseFloat(c.trim()));
            
            const map = L.map('fullscreen-map').setView(firstCoords, 13);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap contributors',
              maxZoom: 19
            }).addTo(map);
            
            fundWithGPS.forEach((finding, index) => {
              const coords = finding.fundstelle_gps.split(',').map(c => parseFloat(c.trim()));
              
              const marker = L.marker(coords).addTo(map);
              
              marker.bindPopup(`
                <div style="min-width: 200px;">
                  <h3 style="font-weight: bold; margin-bottom: 8px; font-size: 16px;">${index + 1}. ${finding.name}</h3>
                  ${finding.foto ? `<img src="${finding.foto}" style="width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px;" />` : ''}
                  <p style="margin: 4px 0;"><strong>${t('materialLabel')}:</strong> ${finding.material}</p>
                  <p style="margin: 4px 0;"><strong>${t('findTypeLabel')}:</strong> ${finding.fundart || t('noInfo')}</p>
                  <p style="margin: 4px 0;"><strong>${t('findSiteDetail')}:</strong> ${finding.fundstelle || t('noInfo')}</p>
                  <p style="margin: 4px 0;"><strong>${t('date')}:</strong> ${finding.datum}</p>
                </div>
              `);
            });
            
            if (fundWithGPS.length > 1) {
              const bounds = L.latLngBounds(fundWithGPS.map(f => {
                const coords = f.fundstelle_gps.split(',').map(c => parseFloat(c.trim()));
                return coords;
              }));
              map.fitBounds(bounds, { padding: [50, 50] });
            }
          }, 100);
        }
      }, [showMap, findings, language]);

      // Home Map useEffect
      useEffect(() => {
        if (screen === 'home') {
          setTimeout(() => {
            const mapContainer = document.getElementById('home-map');
            if (!mapContainer) return;
            
            mapContainer.innerHTML = '';
            
            const fundWithGPS = findings.filter(f => f.fundstelle_gps);
            
            const defaultCoords = fundWithGPS.length > 0 
              ? fundWithGPS[0].fundstelle_gps.split(',').map(c => parseFloat(c.trim()))
              : [49.1234, 8.1234];
            
            const map = L.map('home-map').setView(defaultCoords, fundWithGPS.length > 0 ? 12 : 10);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap',
              maxZoom: 19
            }).addTo(map);
            
            if (fundWithGPS.length > 0) {
              fundWithGPS.forEach((finding, index) => {
                const coords = finding.fundstelle_gps.split(',').map(c => parseFloat(c.trim()));
                
                const marker = L.marker(coords).addTo(map);
                
                marker.bindPopup(`
                  <div style="min-width: 150px;">
                    <h4 style="font-weight: bold; margin-bottom: 4px;">${finding.name}</h4>
                    <p style="margin: 2px 0; font-size: 12px;"><strong>${t('materialLabel')}:</strong> ${finding.material}</p>
                  </div>
                `);
              });
              
              if (fundWithGPS.length > 1) {
                const bounds = L.latLngBounds(fundWithGPS.map(f => {
                  const coords = f.fundstelle_gps.split(',').map(c => parseFloat(c.trim()));
                  return coords;
                }));
                map.fitBounds(bounds, { padding: [30, 30] });
              }
            }
          }, 100);
        }
      }, [screen, findings, language]);

      // LADE-BILDSCHIRM
      if (isLoading) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center p-4">
            <div className="text-center">
              <div className="text-6xl mb-4">🏺</div>
              <h1 className="text-2xl font-bold text-blue-600 mb-2">Let's Go Archaeo</h1>
              <p className="text-gray-600 mb-4">{t('loading')}</p>
              <div className="flex justify-center gap-2">
                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay:'0ms'}}></div>
                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay:'150ms'}}></div>
                <div className="w-3 h-3 bg-blue-500 rounded-full animate-bounce" style={{animationDelay:'300ms'}}></div>
              </div>
            </div>
          </div>
        );
      }

      // LOGIN & REGISTRIERUNGS SCREEN
      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-blue-50 to-blue-100 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
              {!showRegister ? (
                <>
                  <div className="text-center mb-8">
                    <h1 className="text-4xl font-bold text-blue-600 mb-2">🏺 Let's Go Archaeo</h1>
                    <p className="text-gray-600">{t('appSubtitle')}</p>
                  </div>

                  {/* Language selector on login */}
                  <div className="flex justify-center gap-2 mb-6">
                    {[{code:'de',flag:'🇩🇪'},{code:'en',flag:'🇬🇧'},{code:'ko',flag:'🇰🇷'}].map(lang => (
                      <button
                        key={lang.code}
                        onClick={() => setLanguage(lang.code)}
                        className={`px-3 py-2 rounded-lg text-sm font-bold transition ${language === lang.code ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}
                      >
                        {lang.flag} {lang.code.toUpperCase()}
                      </button>
                    ))}
                  </div>

                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('username')}</label>
                      <input
                        type="text"
                        value={loginData.username}
                        onChange={(e) => setLoginData({...loginData, username: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                        placeholder={t('usernamePlaceholder')}
                        required
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('password')}</label>
                      <input
                        type="password"
                        value={loginData.password}
                        onChange={(e) => setLoginData({...loginData, password: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                        placeholder={t('passwordPlaceholder')}
                        required
                      />
                    </div>

                    {loginError && (
                      <div className="bg-red-50 border-2 border-red-200 rounded-xl p-3 text-red-700 text-sm">
                        ⚠️ {loginError}
                      </div>
                    )}

                    <button
                      type="submit"
                      className="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition"
                    >
                      {t('login')}
                    </button>
                  </form>

                  <div className="mt-6 text-center">
                    <p className="text-gray-600 mb-3">{t('noAccount')}</p>
                    <button
                      onClick={() => setShowRegister(true)}
                      className="w-full bg-green-500 text-white py-3 rounded-xl font-bold hover:bg-green-600 transition"
                    >
                      {t('createAccount')}
                    </button>
                  </div>

                  <div className="mt-8 pt-6 border-t border-gray-200">
                    <p className="text-sm font-bold text-gray-700 mb-3">📌 {t('demoAccounts')}</p>
                    <div className="space-y-2 text-xs text-gray-600">
                      <div className="bg-gray-50 p-3 rounded-lg">
                        <strong>{t('student')}:</strong> demo_student / demo123
                      </div>
                      <div className="bg-gray-50 p-3 rounded-lg">
                        <strong>{t('archaeologist')}:</strong> demo_archaeologist / demo123
                      </div>
                      <div className="bg-gray-50 p-3 rounded-lg">
                        <strong>{t('admin')}:</strong> demo_admin / admin123
                      </div>
                    </div>
                  </div>
                </>
              ) : (
                <>
                  <div className="text-center mb-6">
                    <h2 className="text-3xl font-bold text-green-600 mb-2">{t('registration')}</h2>
                    <p className="text-gray-600">{t('createYourAccount')}</p>
                  </div>

                  <form onSubmit={handleRegister} className="space-y-4">
                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('firstName')} *</label>
                      <input
                        type="text"
                        value={registerData.vorname}
                        onChange={(e) => setRegisterData({...registerData, vorname: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none"
                        placeholder={t('firstNamePlaceholder')}
                        required
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('lastName')} *</label>
                      <input
                        type="text"
                        value={registerData.name}
                        onChange={(e) => setRegisterData({...registerData, name: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none"
                        placeholder={t('lastNamePlaceholder')}
                        required
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('username')} *</label>
                      <input
                        type="text"
                        value={registerData.username}
                        onChange={(e) => setRegisterData({...registerData, username: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none"
                        placeholder={t('uniqueUsername')}
                        required
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('passwordMin')}</label>
                      <input
                        type="password"
                        value={registerData.password}
                        onChange={(e) => setRegisterData({...registerData, password: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none"
                        placeholder={t('securePassword')}
                        required
                        minLength="6"
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-bold text-gray-700 mb-2">{t('passwordConfirm')} *</label>
                      <input
                        type="password"
                        value={registerData.passwordConfirm}
                        onChange={(e) => setRegisterData({...registerData, passwordConfirm: e.target.value})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-green-500 focus:outline-none"
                        placeholder={t('passwordRepeat')}
                        required
                      />
                    </div>

                    <div className="bg-blue-50 border-2 border-blue-200 rounded-xl p-4">
                      <label className="block text-sm font-bold text-gray-700 mb-2">🔑 {t('roleCode')} *</label>
                      <input
                        type="text"
                        value={registerData.roleCode}
                        onChange={(e) => setRegisterData({...registerData, roleCode: e.target.value.toUpperCase()})}
                        className="w-full px-4 py-3 rounded-xl border-2 border-blue-300 focus:border-blue-500 focus:outline-none"
                        placeholder={t('enterCode')}
                        required
                      />
                      <p className="text-xs text-gray-600 mt-2">
                        {t('roleCodeHint')}
                      </p>
                    </div>

                    {registerError && (
                      <div className="bg-red-50 border-2 border-red-200 rounded-xl p-3 text-red-700 text-sm">
                        ⚠️ {registerError}
                      </div>
                    )}

                    <button
                      type="submit"
                      className="w-full bg-green-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-green-700 transition"
                    >
                      {t('createAccountBtn')}
                    </button>

                    <button
                      type="button"
                      onClick={() => {
                        setShowRegister(false);
                        setRegisterError('');
                        setRegisterData({
                          vorname: '',
                          name: '',
                          username: '',
                          password: '',
                          passwordConfirm: '',
                          roleCode: ''
                        });
                      }}
                      className="w-full bg-gray-200 text-gray-700 py-3 rounded-xl font-bold hover:bg-gray-300 transition"
                    >
                      {t('backToLogin')}
                    </button>
                  </form>

                  <div className="mt-6 pt-6 border-t border-gray-200">
                    <p className="text-xs font-bold text-gray-700 mb-2">📋 {t('availableRoleCodes')}</p>
                    <div className="space-y-1 text-xs text-gray-600">
                      <div className="bg-gray-50 p-2 rounded">
                        <strong>MPDV2026</strong> → {t('student')}
                      </div>
                      <div className="bg-gray-50 p-2 rounded">
                        <strong>ARCHAEO2026</strong> → {t('archaeologist')}
                      </div>
                      <div className="bg-gray-50 p-2 rounded">
                        <strong>ADMIN2026</strong> → {t('administrator')}
                      </div>
                    </div>
                    <p className="text-xs text-gray-500 mt-3 italic">
                      {t('roleCodesSecret')}
                    </p>
                  </div>
                </>
              )}
            </div>
          </div>
        );
      }

      // HAUPT-APP (nach Login)
      return (
        <div className="min-h-screen pb-20" style={{backgroundColor: 'var(--bg-primary)'}}>
          {/* Header */}
          <div className="bg-blue-600 text-white p-4 flex items-center justify-between sticky top-0 z-[100] shadow-lg">
            <div>
              <h1 className="text-2xl font-bold">🏺 Let's Go Archaeo</h1>
              <p className="text-sm opacity-90">{currentUser.vorname} {currentUser.name} ({getRoleName(currentUser.role)})</p>
            </div>
            <div className="flex items-center gap-3">
              <button 
                onClick={() => setShowHelp(true)}
                className="bg-white/20 w-10 h-10 rounded-full flex items-center justify-center hover:bg-white/30 transition text-xl"
              >
                ❓
              </button>
            </div>
          </div>

          {/* HOME Screen */}
          {screen === 'home' && (
            <div className="p-4 space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <button onClick={() => {
                  setScreen('documents');
                  setTimeout(() => addFinding(), 100);
                }} className="bg-gradient-to-br from-green-500 to-green-600 text-white rounded-2xl p-4 shadow hover:shadow-lg transition text-center">
                  <div className="text-3xl mb-1">➕</div>
                  <div className="font-bold text-sm">{t('newFind')}</div>
                </button>

                <button className="bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl p-4 shadow hover:shadow-lg transition text-center">
                  <div className="text-3xl mb-1">📁</div>
                  <div className="font-bold text-sm">{t('importExport')}</div>
                </button>
              </div>

              <div className="bg-white rounded-2xl shadow-lg overflow-hidden relative z-10">
                <div className="bg-blue-600 text-white p-3 flex items-center justify-between">
                  <h3 className="font-bold">🗺️ {t('findMap')}</h3>
                  <button
                    onClick={() => setShowMap(true)}
                    className="text-xs bg-white/20 px-3 py-1 rounded-full hover:bg-white/30 transition"
                  >
                    {t('enlarge')}
                  </button>
                </div>
                <div className="relative">
                  <div id="home-map" style={{ width: '100%', height: '250px' }}></div>
                  {findings.filter(f => f.fundstelle_gps).length === 0 && (
                    <div className="absolute inset-0 flex items-center justify-center bg-gray-100 pointer-events-none">
                      <div className="text-center p-4">
                        <p className="text-gray-600 text-sm">{t('noGPSFinds')}</p>
                        <p className="text-gray-500 text-xs mt-1">{t('addGPSFinds')}</p>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {findings.length > 0 && (
                <div className="bg-white rounded-2xl p-4 shadow-lg">
                  <h3 className="text-lg font-bold mb-3 text-gray-800">📄 {t('myFinds')} ({findings.length})</h3>
                  <div className="space-y-2">
                    {findings.slice(-3).reverse().map(finding => (
                      <div key={finding.id} onClick={() => viewFinding(finding)} className="flex items-center gap-3 p-3 bg-gray-50 rounded-xl hover:bg-gray-100 cursor-pointer transition">
                        {finding.foto ? (
                          <img src={finding.foto} alt={finding.name} className="w-14 h-14 object-cover rounded-lg" />
                        ) : (
                          <div className="w-14 h-14 bg-gray-200 rounded-lg"></div>
                        )}
                        <div className="flex-1">
                          <div className="font-bold text-sm text-gray-800">{finding.name}</div>
                          <div className="text-xs text-gray-600">{finding.material} • {finding.datum}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <button

                    </ul>
                  </div>

                  <div className="bg-gray-50 rounded-xl p-4">
                    <h4 className="font-bold text-gray-800 mb-2">👥 {t('developedBy')}</h4>
                    <p className="text-sm text-gray-700">
                      APG Let's Goooooo @MPDV<br/>
                      Heidelberger Str. 39, 74821 Mosbach
                    </p>
                  </div>

                  <div className="bg-yellow-50 rounded-xl p-4">
                    <h4 className="font-bold text-gray-800 mb-2">📧 {t('contactSupport')}</h4>
                    <p className="text-sm text-gray-700">
                      <strong>{t('email')}:</strong> lego-roboter.ag@apg-mosbach.de<br/>
                      <strong>{t('phone')}:</strong> 06261-97240
                    </p>
                  </div>

                  <div className="text-center text-sm text-gray-500 pt-4 border-t">
                    <p>© 2026 APG Let's Goooooo @MPDV</p>
                    <p className="mt-1">{t('allRightsReserved')}</p>
                  </div>

                  <button
                    onClick={() => setShowUeber(false)}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition"
                  >
                    {t('close')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Hilfe Modal */}
          {showHelp && (
            <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-[200] p-4 pt-20 overflow-y-auto">
              <div className={`rounded-3xl p-6 max-w-2xl w-full shadow-2xl ${helpDarkMode ? 'bg-gray-800' : 'bg-white'}`}>
                <div className="flex justify-between items-start mb-6">
                  <h2 className={`text-2xl font-bold ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>📚 {t('help')}</h2>
                  <div className="flex items-center gap-2">
                    <button 
                      onClick={() => setShowHelp(false)}
                      className="w-10 h-10 bg-red-500 text-white rounded-full hover:bg-red-600 transition"
                    >
                      ✖
                    </button>
                  </div>
                </div>

                <div className="space-y-4">
                  <div className={`rounded-xl p-4 border-l-4 border-blue-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-blue-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      📄 {t('helpDocTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpDocText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-green-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-green-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      📍 {t('helpGPSTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpGPSText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-red-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-red-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      🗑️ {t('helpDeleteTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpDeleteText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-yellow-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-yellow-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      ✏️ {t('helpEditTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpEditText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-pink-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-pink-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      ❤️ {t('helpLikeTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpLikeText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-cyan-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-cyan-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      🗺️ {t('helpMapTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpMapText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-purple-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-purple-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      👥 {t('helpRolesTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpRolesText')}
                    </p>
                  </div>

                  <div className={`rounded-xl p-4 border-l-4 border-orange-500 ${helpDarkMode ? 'bg-gray-700' : 'bg-orange-50'}`}>
                    <h3 className={`font-bold mb-2 flex items-center gap-2 ${helpDarkMode ? 'text-white' : 'text-gray-800'}`}>
                      📧 {t('helpMsgTitle')}
                    </h3>
                    <p className={`text-sm ${helpDarkMode ? 'text-gray-300' : 'text-gray-700'}`}>
                      {t('helpMsgText')}
                    </p>
                  </div>

                  <a 
                    href="https://denkmalpflege-bw.de" 
                    target="_blank"
                    rel="noopener noreferrer"
                    className="block bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl font-bold transition text-center"
                  >
                    🔗 denkmalpflege-bw.de
                  </a>

                  <button
                    onClick={() => setShowHelp(false)}
                    className={`w-full py-3 rounded-xl font-bold transition ${helpDarkMode ? 'bg-gray-600 hover:bg-gray-500 text-white' : 'bg-gray-200 hover:bg-gray-300 text-gray-800'}`}
                  >
                    {t('back')}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Nachrichten Modal */}
          {showMessageModal && (
            <div className="fixed inset-0 bg-black/50 flex items-start justify-center z-[200] p-4 pt-20 overflow-y-auto">
              <div className="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl">
                <div className="flex justify-between items-start mb-6">
                  <h3 className="text-2xl font-bold text-gray-800">✉️ {t('newMessage')}</h3>
                  <button 
                    onClick={() => {
                      setShowMessageModal(false);
                      setCurrentMessage({ to: 'Alle', betreff: '', text: '' });
                    }}
                    className="w-10 h-10 bg-red-500 text-white rounded-full hover:bg-red-600 transition"
                  >
                    ✖
                  </button>
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">{t('recipient')}</label>
                    <select 
                      value={currentMessage.to} 
                      onChange={(e) => setCurrentMessage({...currentMessage, to: e.target.value})} 
                      className="w-full px-5 py-4 bg-gray-100 rounded-xl border-2 border-gray-200"
                    >
                      <option value="Alle">{t('all')}</option>
                      {users.filter(u => u.username !== currentUser.username).map(u => (
                        <option key={u.username} value={u.username}>{u.vorname} {u.name} ({getRoleName(u.role)})</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">{t('subjectOptional')}</label>
                    <input 
                      type="text" 
                      placeholder={t('subjectPlaceholder')}
                      value={currentMessage.betreff} 
                      onChange={(e) => setCurrentMessage({...currentMessage, betreff: e.target.value})} 
                      className="w-full px-5 py-4 bg-gray-100 rounded-xl border-2 border-gray-200" 
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-2">{t('messageRequired')}</label>
                    <textarea 
                      placeholder={t('yourMessage')}
                      value={currentMessage.text} 
                      onChange={(e) => setCurrentMessage({...currentMessage, text: e.target.value})} 
                      className="w-full px-5 py-4 bg-gray-100 rounded-xl resize-none border-2 border-gray-200" 
                      rows="8"
                    />
                  </div>

                  <div className="flex gap-3">
                    <button 
                      onClick={sendMessage} 
                      className="flex-1 bg-green-600 text-white py-4 rounded-xl font-bold hover:bg-green-700 transition"
                    >
                      📤 {t('send')}
                    </button>
                    <button 
                      onClick={() => {
                        setShowMessageModal(false);
                        setCurrentMessage({ to: 'Alle', betreff: '', text: '' });
                      }} 
                      className="flex-1 bg-gray-200 py-4 rounded-xl font-bold hover:bg-gray-300 transition"
                    >
                      {t('cancel')}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Fund DSGVO-Bestätigung vor dem Speichern */}
          {showFundDsgvo && (
            <div className="fixed inset-0 bg-black/70 flex items-start justify-center z-[200] p-4 pt-20 overflow-y-auto">
              <div className="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[85vh] overflow-y-auto">
                <div className="space-y-4">
                  <div className="bg-yellow-50 rounded-xl p-4 border-2 border-yellow-400">
                    <h3 className="font-bold text-gray-900 mb-2 flex items-center gap-2">
                      📍 {t('gpsLocationData')}
                    </h3>
                    <p className="text-sm text-gray-700">
                      {t('gpsConsentText')}
                    </p>
                  </div>

                  <div className="bg-gray-50 rounded-xl p-4">
                    <h3 className="font-bold text-gray-900 mb-2 flex items-center gap-2">
                      📧 {t('responsible')}
                    </h3>
                    <p className="text-sm text-gray-700">
                      APG Let's Goooooo @MPDV<br/>
                      Heidelberger Str. 39, 74821 Mosbach<br/>
                      {t('email')}: lego-roboter.ag@apg-mosbach.de<br/>
                      {t('phone')}: 06261-97240
                    </p>
                  </div>

                  <div className="bg-blue-50 rounded-xl p-4">
                    <label className="flex items-start gap-3 cursor-pointer">
                      <input
                        type="checkbox"
                        checked={fundDsgvoAccepted}
                        onChange={(e) => setFundDsgvoAccepted(e.target.checked)}
                        className="mt-1 w-5 h-5 rounded"
                      />
                      <span className="text-sm text-gray-700">
                        {t('dsgvoCheckbox')}{' '}
                        <strong>{t('dsgvoResearchOnly')}</strong>. {t('dsgvoConfirmPrefix')}{' '}
                        <span className="text-red-600 font-bold">{t('dsgvoNoSale')}</span>
                      </span>
                    </label>
                  </div>

                  <div className="flex gap-3">
                    <button
                      onClick={confirmSaveFinding}
                      disabled={!fundDsgvoAccepted}
                      className={`flex-1 py-4 rounded-xl font-bold text-lg transition ${
                        fundDsgvoAccepted
                          ? 'bg-green-600 text-white hover:bg-green-700'
                          : 'bg-gray-300 text-gray-500 cursor-not-allowed'
                      }`}
                    >
                      ✓ {t('accept')}
                    </button>
                    <button
                      onClick={() => {
                        setShowFundDsgvo(false);
                        setFundDsgvoAccepted(false);
                      }}
                      className="flex-1 bg-gray-200 text-gray-700 py-4 rounded-xl font-bold text-lg hover:bg-gray-300 transition"
                    >
                      {t('cancel')}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Vollbild Map Modal */}
          {showMap && (
            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-[9999] p-4">
              <div className="bg-white rounded-3xl w-full h-full max-w-6xl max-h-[90vh] shadow-2xl flex flex-col overflow-hidden">
                <div className="bg-blue-600 text-white p-4 flex items-center justify-between">
                  <h2 className="text-xl font-bold">🗺️ {t('mapTitle')}</h2>
                  <button
                    onClick={() => setShowMap(false)}
                    className="w-10 h-10 bg-red-500 rounded-full flex items-center justify-center text-2xl hover:bg-red-600"
                  >
                    ✖️
                  </button>
                </div>
                
                <div className="flex-1 relative">
                  {findings.filter(f => f.fundstelle_gps).length === 0 ? (
                    <div className="h-full flex items-center justify-center">
                      <div className="text-center">
                        <p className="text-2xl mb-2">📍</p>
                        <p className="text-gray-600">{t('noGPSFindsMap')}</p>
                        <p className="text-sm text-gray-500 mt-2">{t('addGPSToSeeMap')}</p>
                      </div>
                    </div>
                  ) : (
                    <>
                      <div id="fullscreen-map" style={{ width: '100%', height: '100%' }}></div>
                      
                      <div className="absolute top-4 left-4 bg-white rounded-xl shadow-lg p-4 max-w-xs max-h-96 overflow-y-auto z-[1000]">
                        <h3 className="font-bold mb-3 sticky top-0 bg-white pb-2 border-b">
                          📍 {t('findSitesCount')} ({findings.filter(f => f.fundstelle_gps).length})
                        </h3>
                        <div className="space-y-2">
                          {findings.filter(f => f.fundstelle_gps).map((finding, index) => (
                            <div key={finding.id} className="p-2 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer">
                              <p className="font-bold text-sm">{index + 1}. {finding.name}</p>
                              <p className="text-xs text-gray-600">📍 {finding.fundstelle_gps}</p>
                              <p className="text-xs text-gray-500">{finding.datum}</p>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="absolute bottom-4 right-4 bg-white rounded-xl shadow-lg p-3 z-[1000]">
                        <p className="text-sm font-bold">ℹ️ {t('interactiveMap')}</p>
                        <p className="text-xs text-gray-600 mt-1">
                          {t('mapClickMarkers')}<br/>
                          {t('mapZoomHint')}
                        </p>
                      </div>
                    </>
                  )}
                </div>

                <div className="bg-gray-100 p-4">
                  <button
                    onClick={() => setShowMap(false)}
                    className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700"
                  >
                    {t('close')}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>

</body>
</html>
